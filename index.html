<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup Composer — Free版</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; min-height: 100vh; }
  #root { min-height: 100vh; }
  #splash {
    position: fixed; inset: 0; z-index: 9998;
    background: #0d1117;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    transition: opacity 0.6s ease-out;
  }
  #splash.hide { opacity: 0; pointer-events: none; }
  #splash .logo-img {
    height: 60px;
    opacity: 0; animation: fadeUp 0.8s ease-out 0.2s forwards;
  }
  #splash .logo-sub {
    font-family: "Helvetica Neue", sans-serif;
    font-size: 12px; color: #f97316; letter-spacing: 3px;
    opacity: 0; animation: fadeUp 0.8s ease-out 0.5s forwards;
  }
  #splash .bar-wrap {
    width: 180px; height: 3px; background: #1e2535; border-radius: 2px;
    overflow: hidden; margin-top: 8px;
    opacity: 0; animation: fadeUp 0.6s ease-out 0.7s forwards;
  }
  #splash .bar-fill {
    width: 0%; height: 100%; background: linear-gradient(90deg, #f97316, #4F8EF7);
    border-radius: 2px; animation: loading 1.2s ease-in-out 0.8s forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes loading {
    0% { width: 0%; }
    60% { width: 85%; }
    100% { width: 100%; }
  }
</style>
